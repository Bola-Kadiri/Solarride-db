spring:
  datasource:
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10

  # Read replica for analytics queries
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    baseline-on-migrate: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.solarride.solarride: INFO
    org.hibernate.SQL: WARN