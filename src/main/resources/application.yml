spring:
  application:
    name: solarride

  datasource:
    url: jdbc:postgresql://localhost:5434/solarride
    username: solarride_user
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.solarride: INFO